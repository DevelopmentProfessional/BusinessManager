services:
  # Backend API Service
  - type: web
    name: BusinessManager_Reference_API
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    preDeployCommand: python backend/init_database.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dd_reference_temp
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://businessmanager-reference.onrender.com,http://localhost:5173
      - key: ENVIRONMENT
        value: production

  # Frontend Service
  - type: static
    name: BusinessManager_Reference
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://businessmanager-reference-api.onrender.com/api/v1
      - key: VITE_ONLYOFFICE_URL
        value: https://businessmanager-onlyoffice.onrender.com

  # OnlyOffice Document Server (Community Edition)
  - type: web
    name: BusinessManager_OnlyOffice
    env: docker
    plan: starter
    dockerImage: onlyoffice/documentserver
    envVars:
      - key: JWT_ENABLED
        value: "false"

databases:
  - name: dd_reference_temp
    databaseName: businessmanager
    user: businessmanager
    plan: starter