name: Deploy to AWS EC2 via CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create and upload deployment bundle to S3
        run: |
          zip -r deploy.zip . \
            -x '*.git*' \
            -x '*/node_modules/*' \
            -x 'frontend/dist/*' \
            -x 'backend/uploads/*' \
            -x '*.pyc' \
            -x '*/__pycache__/*'
          aws s3 cp deploy.zip s3://businessmanager-deployments-890749832422/deploy.zip

      - name: Trigger CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name BusinessManagerApp \
            --deployment-group-name BusinessManagerDG \
            --s3-location bucket=businessmanager-deployments-890749832422,key=deploy.zip,bundleType=zip \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --description "Deploy ${{ github.sha }} by ${{ github.actor }}"
