name: Deploy

on:
  push:
    branches:
      - main
      - Document-Management
    paths:
      - "backend/**"
      - "client-api/**"
      - "Dockerfile"
      - ".dockerignore"
      - "appspec.yml"
      - "scripts/**"
      - "frontend/**"
      - "client-portal/**"
      - "CompanyCreation/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which surface to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - backend
          - frontend
          - client-portal
          - company-creation
          - all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  DEPLOY_BUCKET: businessmanager-deployments-890749832422
  DEPLOY_KEY: codedeploy/deploy-${{ github.sha }}.zip
  CODEDEPLOY_APP_NAME: BusinessManager
  CODEDEPLOY_GROUP_NAME: BusinessManagerDG
  STAFF_FRONTEND_BUCKET: businessmanager-staff-frontend-890749832422
  CLIENT_PORTAL_BUCKET: businessmanager-client-portal-890749832422
  COMPANY_CREATION_BUCKET: ${{ vars.COMPANY_CREATION_BUCKET }}
  STAFF_CLOUDFRONT_DIST_ID: E1U0Y4HOZ5YQUN
  CLIENT_PORTAL_CLOUDFRONT_DIST_ID: E15XOGU780XAU9
  COMPANY_CREATION_CLOUDFRONT_DIST_ID: ${{ vars.COMPANY_CREATION_CLOUDFRONT_DIST_ID }}
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://d26nmpoviuf1jh.cloudfront.net/api/v1' }}
  VITE_CLIENT_API_URL: ${{ vars.VITE_CLIENT_API_URL || 'https://d26nmpoviuf1jh.cloudfront.net/api/client' }}

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      client_portal: ${{ steps.filter.outputs.client_portal }}
      company_creation: ${{ steps.filter.outputs.company_creation }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'client-api/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'appspec.yml'
              - 'scripts/**'
            frontend:
              - 'frontend/**'
            client_portal:
              - 'client-portal/**'
            company_creation:
              - 'CompanyCreation/**'

  deploy-backend:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'backend' || inputs.target == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create and upload deployment bundle to S3
        run: |
          zip -r deploy.zip . \
            -x '*.git*' \
            -x '*/node_modules/*' \
            -x 'frontend/dist/*' \
            -x 'backend/uploads/*' \
            -x '*.pyc' \
            -x '*/__pycache__/*'
          aws s3 cp deploy.zip s3://${{ env.DEPLOY_BUCKET }}/${{ env.DEPLOY_KEY }}

      - name: Trigger CodeDeploy deployment
        id: create_deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${{ env.CODEDEPLOY_APP_NAME }}" \
            --deployment-group-name "${{ env.CODEDEPLOY_GROUP_NAME }}" \
            --s3-location bucket=${{ env.DEPLOY_BUCKET }},key=${{ env.DEPLOY_KEY }},bundleType=zip \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --description "Deploy ${{ github.sha }} by ${{ github.actor }}" \
            --query deploymentId \
            --output text)

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment to complete
        run: |
          aws deploy wait deployment-successful --deployment-id "${{ steps.create_deployment.outputs.deployment_id }}"

  deploy-staff-frontend:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.frontend == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'frontend' || inputs.target == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and build
        run: |
          npm ci
          VITE_API_URL=${{ env.VITE_API_URL }} VITE_BUILD_TIME=$(TZ="Atlantic/Bermuda" date +"%Y/%m/%d %H:%M") npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ env.STAFF_FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.STAFF_CLOUDFRONT_DIST_ID }} \
            --paths "/*"

  deploy-client-portal:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.client_portal == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'client-portal' || inputs.target == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-portal/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and build
        working-directory: client-portal
        run: |
          npm ci
          VITE_CLIENT_API_URL=${{ env.VITE_CLIENT_API_URL }} npm run build

      - name: Deploy to S3
        run: aws s3 sync client-portal/dist/ s3://${{ env.CLIENT_PORTAL_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLIENT_PORTAL_CLOUDFRONT_DIST_ID }} \
            --paths "/*"

  deploy-company-creation:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.company_creation == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'company-creation' || inputs.target == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CompanyCreation/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CompanyCreation deploy settings
        run: |
          test -n "${{ env.COMPANY_CREATION_BUCKET }}"
          test -n "${{ env.COMPANY_CREATION_CLOUDFRONT_DIST_ID }}"

      - name: Install dependencies and build
        working-directory: CompanyCreation
        run: |
          npm ci
          VITE_API_URL=${{ env.VITE_API_URL }} npm run build

      - name: Deploy to S3
        run: aws s3 cp CompanyCreation/dist/ s3://${{ env.COMPANY_CREATION_BUCKET }}/ --recursive

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.COMPANY_CREATION_CLOUDFRONT_DIST_ID }} \
            --paths "/*"
