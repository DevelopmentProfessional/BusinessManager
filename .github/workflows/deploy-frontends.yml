name: Deploy Frontends

on:
  push:
    branches: [main, Document-Management]
    paths:
      - 'frontend/**'
      - 'client-portal/**'
  workflow_dispatch:

concurrency:
  group: deploy-frontends-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      client_portal: ${{ steps.filter.outputs.client_portal }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            client_portal:
              - 'client-portal/**'

  deploy-staff-frontend:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=https://d26nmpoviuf1jh.cloudfront.net/api/v1 npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://businessmanager-staff-frontend-890749832422 --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1U0Y4HOZ5YQUN \
            --paths "/*"

  deploy-client-portal:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.client_portal == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and build
        working-directory: client-portal
        run: |
          npm ci
          VITE_CLIENT_API_URL=https://d26nmpoviuf1jh.cloudfront.net/api/client npm run build

      - name: Deploy to S3
        run: aws s3 sync client-portal/dist/ s3://businessmanager-client-portal-890749832422 --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E15XOGU780XAU9 \
            --paths "/*"
