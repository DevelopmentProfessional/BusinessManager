name: Deploy Client API

on:
  push:
    branches: [main, Document-Management]
    paths:
      - "client-api/**"
  workflow_dispatch:

concurrency:
  group: deploy-client-api-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 890749832422.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: businessmanager-client-api
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:890749832422:service/businessmanager-client-api/7a4bdffc13864304a63c4750a831dbcd

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          cd client-api
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build -t "$IMAGE_URI:${{ github.sha }}" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:${{ github.sha }}"
          docker push "$IMAGE_URI:latest"

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --region "${{ env.AWS_REGION }}"
