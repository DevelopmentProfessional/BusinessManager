name: Deploy Staff Frontend

on:
  push:
    branches:
      - main
      - Document-Management
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  STAFF_FRONTEND_BUCKET: businessmanager-staff-frontend-890749832422
  STAFF_CLOUDFRONT_DIST_ID: E1U0Y4HOZ5YQUN
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.vadpivi.com/api/v1' }}

jobs:
  deploy-staff-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and build
        run: |
          npm ci
          VITE_API_URL=${{ env.VITE_API_URL }} VITE_BUILD_TIME=$(TZ="Atlantic/Bermuda" date +"%Y/%m/%d %H:%M") npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ env.STAFF_FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.STAFF_CLOUDFRONT_DIST_ID }} \
            --paths "/*"
